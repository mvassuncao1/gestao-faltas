version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: faltas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_aqui
      MYSQL_DATABASE: controle_faltas
      MYSQL_PASSWORD: faltas_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faltas_backend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root_password_aqui
      - DB_NAME=controle_faltas
    depends_on:
      - database
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: faltas_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    command: npm run dev -- --host

volumes:
  mysql_data: